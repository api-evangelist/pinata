specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Pinata
providerId: pinata
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- IPFS
- Storage
- Gateway
- Rate Limiting
description: Pinata enforces per-API-key request rate limits and per-plan gateway
  request quotas.
notes: Specific RPS depends on plan.
sources:
- https://docs.pinata.cloud/quickstart
responseCodes:
  throttled: 429
limits:
- name: Default
  scope: api_key
  metric: requests_per_minute
  limit: 30
  notes: Default API rate limit on Free plan; higher on paid tiers.
- name: Gateway Requests
  scope: account
  metric: gateway_requests
  limit: see plan
  notes: Per-month gateway request cap by plan.
policies:
- name: Backoff Strategy
  description: Exponential backoff on 429.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
